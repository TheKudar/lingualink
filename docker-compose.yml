services:
  postgres:
    image: postgres:16
    container_name: lingualink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: study_db
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: study_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lingualink-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lingualink-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""

  nginx:
    image: nginx:1.27-alpine
    container_name: lingualink-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
