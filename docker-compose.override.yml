services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: lingualink-backend-dev
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVDI1NmJpdHNMb25nU2VjdXJlS2V5Rm9yU3ByaW5nQm9vdEFwcA==
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
      - target_cache:/app/target
    working_dir: /app
    command: ./mvnw spring-boot:run -Dspring-boot.run.profiles=docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lingualink-frontend-dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
  maven_cache:
  target_cache:
  frontend_node_modules:
  frontend_next:
